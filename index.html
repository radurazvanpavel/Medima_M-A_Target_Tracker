function b(){return Uint8Array.from(atob(PAYLOAD),function(c){return c.charCodeAt(0);});}
async function unlock(){
  var pw=document.getElementById('pw').value;
  var err=document.getElementById('err'),btn=document.getElementById('go');
  if(!pw)return;
  err.textContent='';btn.disabled=true;btn.textContent='Se deschide...';
  try{
    var raw=b(),salt=raw.slice(0,16),iv=raw.slice(16,28),data=raw.slice(28);
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,data);
    var html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){
    err.textContent='Parolă incorectă';
    btn.disabled=false;btn.textContent='Deschide';
    document.getElementById('pw').select();
  }
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
